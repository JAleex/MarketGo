name: CI — Build, Lint & Tests

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Backend — lint + pruebas unitarias e integración
  # ────────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend — Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: Backend/requirements.txt

      - name: Instalar dependencias
        working-directory: Backend
        run: pip install -r requirements.txt flake8

      - name: Lint — flake8
        working-directory: Backend
        run: |
          flake8 . \
            --count \
            --max-line-length=120 \
            --exclude=migrations,__pycache__,.git,db.sqlite3 \
            --per-file-ignores="*/tests.py:E501" \
            --statistics

      - name: Pruebas con cobertura
        working-directory: Backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings_test
          SECRET_KEY: "ci-secret-key-only-for-testing"
          DEBUG: "True"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
        run: |
          coverage run -m pytest \
            --ignore=tests/test_e2e.py \
            -v \
            --tb=short
          coverage report --fail-under=80
          coverage xml -o coverage.xml

      - name: Publicar reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-report
          path: Backend/coverage.xml

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Frontend — lint + build de producción
  # ────────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: Frontend
        run: npm ci

      - name: Lint — ESLint
        working-directory: Frontend
        run: npm run lint

      - name: Build de producción (tsc + vite)
        working-directory: Frontend
        env:
          VITE_API_URL: "http://localhost:8000"
          VITE_FRONT_END_URL: "http://localhost:5173"
        run: npm run build

      - name: Publicar artefacto de build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/dist/
          retention-days: 3
